name: Fetch Blogcard OGP on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  fetch-blogcard-ogp:
    runs-on: ubuntu-latest
    concurrency:
      group: fetch-blogcard-ogp-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch all cache data
        run: npm run fetch-all-cache

      - name: Check for changes
        id: check
        run: |
          if ! git diff --quiet data/; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push cache
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git commit -m "chore: update OGP and embed cache"
          git push origin HEAD:${{ github.head_ref }}
